<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Framework-free Flyfish File Viewer starter with Vite." />
    <title>Flyfish File Viewer · Vanilla Vite Example</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="brand-mark" aria-hidden="true">FV</div>
        <div class="hero-copy">
          <p class="eyebrow">Vanilla JS · Web Component · Vite</p>
          <h1>Browser-native preview in a few lines</h1>
          <p>Lightweight, framework-free, and ready for self-hosted assets.</p>
        </div>
        <div class="hero-actions">
          <label class="button button-primary" for="file-input">Choose a local file</label>
          <input
            id="file-input"
            type="file"
            accept=".txt,.md,.markdown,.json,.js,.ts,.css,.html,.xml,.png,.jpg,.jpeg,.gif,.webp,.svg,.mp3,.ogg,.mp4"
          />
          <a
            class="button"
            href="https://doc.file-viewer.app/guide/quickstart-web"
            target="_blank"
            rel="noreferrer"
            >Read the guide</a
          >
        </div>
      </header>

      <section class="viewer-card" aria-label="File preview">
        <div class="viewer-meta">
          <div>
            <span class="status-dot" aria-hidden="true"></span>
            <strong id="filename">sample.md</strong>
          </div>
          <span class="preset-chip">preset-lite</span>
        </div>
        <flyfish-file-viewer
          id="viewer"
          class="viewer-host"
          src="/sample.md"
          filename="sample.md"
        ></flyfish-file-viewer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
